name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install pip-audit
      - run: python -m pip install -e .
      - run: pip-audit

  codeql:
    permissions:
      security-events: write
      packages: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install . cyclonedx-bom
      - run: cyclonedx-py environment --output-file sbom.json
      - uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: sbom.json
